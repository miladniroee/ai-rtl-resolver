name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install
      - run: npm run build

      - run: |
          cd dist
          zip -r ../ai-rtl-resolver-${{ github.ref_name }}.zip .

      - uses: softprops/action-gh-release@v2
        with:
          files: ai-rtl-resolver-*.zip