name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build extension
        run: npm run build

      - name: Verify dist artifacts
        run: |
          test -f dist/manifest.json
          test -f dist/chatgpt.js
          test -f dist/deepseek.js
          test -f dist/claude.js
          test -f dist/perplexity.js
          test -d dist/fonts
          test -d dist/icons

      - name: Create zip package
        run: |
          cd dist
          zip -r ../ai-rtl-resolver-${{ github.ref_name }}.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ai-rtl-resolver-${{ github.ref_name }}.zip
